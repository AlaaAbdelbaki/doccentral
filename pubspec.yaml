name: docentral
description:
  "DocCentral is a desktop Flutter application for dental clinics, helping a
  dentist and assistant manage appointments, patients, payments, and inventory.
  Offline-first with Drift, synced via Supabase, built with Riverpod."

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  cupertino_icons: ^1.0.8
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.3.1
  go_router: ^17.2.3
  intl: any
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  sqlcipher_flutter_libs: ^0.7.0+eol
  supabase_flutter: ^2.12.4
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.31.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
